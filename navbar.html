<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar</title>
    <style>
        body {
            background-image: url(pic.jpg);
        }
        
        .navbar {
            border: 2px solid red;
            background-color: #6042af;
            border-radius: 10px;
        }
        
        .navbar li a {
            color: white;
            text-decoration: none;
        }
        
        .navbar li {
            float: left;
            list-style: none;
            padding: 6px 3px;
            margin: 2px 11px;
        }
        
        .navbar ul {
            overflow: auto;
        }
        
        .navbar a:hover {
            color: blue;
        }
        
        .navbar input {
            padding: 3px;
            margin: 6px 16px;
            border-radius: 10px;
        }
        
        .search {
            float: right;
            color: white;
            padding: -1px 0px;
            border-radius: 30px;
        }
    </style>

</head>


<body>
    <header>
        <nav class="navbar">
            <ul>


                <li><a href="/index.html">Home</a></li>
                <li><a href="/index.html">About</a></li>
                <li><a href="/index.html">Services</a></li>
                <li><a href="/index.html">Contact Us</a></li>
                <div class="search"> <input type="text" name="search" id="search" placeholder="Search here!"></div>
            </ul>

        </nav>


    </header>

</body>

</html>
